<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>零岚服务器 · 纯净生存社区</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 移除所有元素的点击蓝色轮廓/焦点框 */
        *:focus,
        *:focus-visible,
        *:active {
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        /* 针对按钮、链接、可点击元素的额外处理 */
        button,
        a,
        div[onclick],
        .announcement-card,
        .info-card,
        .social-icon,
        .qq-link {
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #1e2a2f;
            line-height: 1.5;
            background: #f5f7f5;
            animation: pageFade 0.5s ease-out;
        }
        @keyframes pageFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 背景图 - 本地图片 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 半透明玻璃遮罩 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        /* 主容器 - 整体滚动 */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.2rem 3rem;
        }

        /* Hero 主标题 */
        .hero {
            text-align: center;
            padding: 2rem 0 1rem;
            animation: heroGlow 0.7s cubic-bezier(0.2, 1.1, 0.3, 1);
        }
        @keyframes heroGlow {
            0% { opacity: 0; transform: scale(0.96) translateY(-15px); filter: blur(4px);}
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0);}
        }
        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1f3b2f;
            margin-bottom: 0.4rem;
        }
        .hero p {
            font-size: 0.95rem;
            color: #5a7568;
            border-top: 1px solid rgba(80, 100, 85, 0.25);
            display: inline-block;
            padding-top: 0.6rem;
        }

        /* 信息卡片网格 */
        .info-grid {
            max-width: 950px;
            margin: 0.8rem auto 1rem;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.48);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.1rem 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.65);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-align: center;
            opacity: 0;
            transform: translateY(40px);
            animation: cardUp 0.6s ease-out forwards;
            cursor: pointer;
        }
        .info-card:nth-child(1) { animation-delay: 0.1s; }
        .info-card:nth-child(2) { animation-delay: 0.2s; }

        @keyframes cardUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.75);
            transform: translateY(-6px);
            box-shadow: 0 18px 28px -12px rgba(0, 0, 0, 0.15);
        }

        .info-icon {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            transition: transform 0.25s ease;
            display: inline-block;
        }
        .info-card:hover .info-icon {
            transform: scale(1.1);
        }

        .info-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #668b78;
            font-weight: 600;
        }

        .info-value-ip,
        .info-value-port,
        .info-value-single {
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 0.4rem;
            color: #2a5e4a;
            background: rgba(240, 250, 240, 0.8);
            padding: 0.25rem 0.7rem;
            border-radius: 60px;
            display: inline-block;
        }
        .info-value-port { margin-top: 0.15rem; }

        .qq-link-wrapper { margin-top: 10px; }
        .qq-link {
            font-size: 0.68rem;
            color: #4a6e5e;
            text-decoration: none;
            background: rgba(235, 248, 235, 0.8);
            padding: 4px 14px;
            border-radius: 40px;
            display: inline-block;
            transition: all 0.25s;
            cursor: pointer;
        }
        .qq-link:hover {
            background: #deecda;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px -5px rgba(0, 0, 0, 0.1);
        }

        /* MOTD 卡片 */
        .motd-wrapper {
            max-width: 950px;
            margin: 0 auto 0.8rem;
        }
        .motd-card {
            background: rgba(255, 255, 255, 0.42);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 0.6rem;
            border: 1px solid rgba(255,255,255,0.6);
            transition: all 0.35s ease;
            opacity: 0;
            transform: translateY(35px);
            animation: motdFade 0.6s ease-out 0.15s forwards;
        }
        @keyframes motdFade {
            to { opacity: 1; transform: translateY(0); }
        }
        .motd-card iframe {
            max-width: 100%;
            border-radius: 24px;
            display: block;
            margin: 0 auto;
        }
        .motd-card:hover {
            background: rgba(255, 255, 255, 0.68);
            transform: translateY(-3px);
            box-shadow: 0 14px 22px -8px rgba(0, 0, 0, 0.12);
        }

        /* 公告区域 */
        .announcement-section {
            margin: 1rem auto 2rem;
            max-width: 950px;
        }
        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.2rem;
            color: #1f3b2f;
            opacity: 0;
            transform: translateY(20px);
            animation: titleSlide 0.5s ease-out 0.1s forwards;
        }
        @keyframes titleSlide {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 公告列表 */
        .announcement-list {
            width: 100%;
        }

        /* 公告卡片 — 紧凑 */
        .announcement-card {
            background: rgba(255, 255, 255, 0.48);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 0.9rem 1.2rem 0.7rem 1.2rem;
            margin-bottom: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            cursor: pointer;
            border-top: 3px solid rgba(140, 190, 140, 0.7);
            opacity: 0;
            transform: translateY(20px);
            animation: cardFade 0.5s ease-out forwards;
        }
        .announcement-card:nth-child(1) { animation-delay: 0.05s; }
        .announcement-card:nth-child(2) { animation-delay: 0.1s; }
        .announcement-card:nth-child(3) { animation-delay: 0.15s; }
        .announcement-card:nth-child(4) { animation-delay: 0.2s; }
        .announcement-card:nth-child(5) { animation-delay: 0.25s; }

        @keyframes cardFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .announcement-card:hover {
            background: rgba(255, 255, 255, 0.72);
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.12);
        }

        .card-summary {
            color: #2a4638;
            font-size: 0.88rem;
            line-height: 1.5;
            font-weight: 500;
            margin-bottom: 0.5rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .announce-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 0.3rem;
        }

        .card-date {
            font-size: 0.68rem;
            color: #618a72;
            background: rgba(230, 245, 230, 0.7);
            padding: 0.15rem 0.8rem;
            border-radius: 50px;
        }

        /* 社交链接 */
        .social-links {
            text-align: center;
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            opacity: 0;
            animation: socialFade 0.5s ease-out 0.3s forwards;
        }
        @keyframes socialFade {
            to { opacity: 1; }
        }
        .social-icon {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,250,235,0.65);
            backdrop-filter: blur(8px);
            padding: 0.45rem 1.6rem;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(220,230,210,0.6);
            font-size: 0.85rem;
            color: #2a4a3a;
            cursor: pointer;
        }
        .social-icon:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 18px -8px rgba(0, 0, 0, 0.12);
            background: rgba(255,250,230,0.85);
        }
        .bili-icon {
            background: #fb7299dd;
            color: white;
            border: none;
        }
        .bili-icon:hover {
            background: #ff88aa;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #819f8d;
            padding: 1.5rem 0 0.5rem;
            opacity: 0;
            animation: footerFade 0.5s ease 0.4s forwards;
        }
        @keyframes footerFade {
            to { opacity: 1; }
        }

        /* ========== 弹窗样式 - 几乎全屏 ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 0.8rem;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            max-width: 95%;
            width: 95%;
            height: 92vh;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 40px 70px rgba(0,0,0,0.4);
            animation: modalPop 0.3s cubic-bezier(0.2, 1, 0.3, 1);
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            display: flex;
            justify-content: flex-end;
            padding: 1rem 1.2rem 0.3rem;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: #7b9a89;
            transition: 0.2s;
            line-height: 1;
            padding: 0 8px;
        }
        .close-modal:hover {
            transform: rotate(90deg);
            color: #2c5e46;
        }
        .modal-date {
            font-size: 0.85rem;
            color: #588268;
            margin: 0 1.8rem 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e0ebdd;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.2rem 2rem 2rem;
            line-height: 1.7;
            font-size: 1.05rem;
            color: #2b4238;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* 提示 */
        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(45, 85, 64, 0.9);
            backdrop-filter: blur(12px);
            color: white;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1100;
        }
        .toast-msg.show { opacity: 1; }

        /* 横屏提示 */
        .orientation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .orientation-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .orientation-card {
            background: rgba(30, 40, 35, 0.92);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 1.8rem 1.8rem 1.5rem;
            max-width: 320px;
            width: 80%;
            text-align: center;
            position: relative;
        }
        .orientation-card .close-orientation {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #ccc;
        }
        .orientation-card i { font-size: 3rem; color: #ffcd94; margin-bottom: 0.8rem; }
        .orientation-card h3 { font-size: 1.5rem; color: #f2e8cf; margin-bottom: 8px; }
        .orientation-card p { color: #ddd; font-size: 0.9rem; }

        @media (max-width: 640px) {
            .hero h1 { font-size: 1.7rem; }
            .info-grid { gap: 0.7rem; }
            .info-card { padding: 0.9rem 0.4rem; }
            .info-value-ip, .info-value-port, .info-value-single { font-size: 0.75rem; }
            .section-title { font-size: 1.4rem; }
            .announcement-card { padding: 0.7rem 1rem 0.5rem 1rem; }
            .card-summary { font-size: 0.82rem; }
            .social-icon { padding: 0.4rem 1.3rem; font-size: 0.8rem; }
            .modal-content { border-radius: 32px; width: 96%; height: 94vh; }
            .modal-body { font-size: 0.95rem; padding: 0.2rem 1.2rem 1.2rem; }
            .modal-date { margin: 0 1rem 0.3rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <!-- 横屏遮罩 -->

            <button id="closeOrientationBtn" class="close-orientation"><i class="fas fa-times"></i></button>

    <div class="main-container">
        <div class="hero">
            <h1>欢迎来到零岚服务器</h1>

        <!-- 服务器信息卡片 -->
        <div class="info-grid">
            <div class="info-card">
                <div class="info-icon">🎮</div>

                <iframe frameborder="no" border="0" marginwidth="0" marginheight="0" width="500" height="195" scrolling="no" src="https://motdbe.blackbe.work/iframe.html?ip=linlan.9666.fun&port=38573&dark=false&join_open=true"></iframe>

        <!-- 公告区域 -->
        <div class="announcement-section">

        <!-- 底部社交 -->
        <div class="social-links">

    <!-- 弹窗结构 -->
    <div id="modal" class="modal">

            </div>
            <div class="modal-date" id="modalDate"></div>
            <div class="modal-body" id="modalBody"></div>
        </div>

    <div id="toastMsg" class="toast-msg">📋 已复制</div>

    <script>
        // ======================= 彩色粒子特效 (点击任意位置) =======================
        (function() {
            const PARTICLE_COUNT = 20;
            const PARTICLE_LIFESPAN = 700;
            const GRAVITY = 0.32;
            const BASE_SIZE = 7;

            const COLOR_PALETTE = [
                { r: 255, g: 100, b: 100 }, { r: 255, g: 180, b: 80 },
                { r: 100, g: 220, b: 120 }, { r: 80, g: 200, b: 240 },
                { r: 220, g: 120, b: 240 }, { r: 255, g: 220, b: 80 },
                { r: 255, g: 140, b: 180 }, { r: 100, g: 240, b: 200 },
                { r: 255, g: 100, b: 180 }, { r: 160, g: 100, b: 255 }
            ];

            function getRandomColor() {
                const col = COLOR_PALETTE[Math.floor(Math.random() * COLOR_PALETTE.length)];
                return `rgb(${col.r}, ${col.g}, ${col.b})`;
            }

            function rand(min, max) {
                return min + Math.random() * (max - min);
            }

            function createParticle(x, y) {
                const particle = document.createElement('div');
                const size = BASE_SIZE * (0.6 + Math.random() * 0.9);
                const color = getRandomColor();
                const vx = rand(-5.5, 5.5);
                const vy = rand(-9.5, -2.5);
                
                particle.style.position = 'fixed';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.borderRadius = '50%';
                particle.style.backgroundColor = color;
                particle.style.boxShadow = `0 0 8px ${color}`;
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '9999';
                particle.style.opacity = '0.95';
                particle.style.willChange = 'transform, opacity';
                document.body.appendChild(particle);

                let startTime = performance.now();
                let posX = x, posY = y;
                let currentVx = vx, currentVy = vy;

                function updateParticle(now) {
                    const elapsed = now - startTime;
                    if (elapsed >= PARTICLE_LIFESPAN) {
                        if (particle && particle.parentNode) particle.remove();
                        return;
                    }
                    const progress = elapsed / PARTICLE_LIFESPAN;
                    const opacity = 0.95 * (1 - progress);
                    const t = elapsed / 1000;
                    const newX = posX + currentVx * t * 60;
                    const newY = posY + (currentVy * t * 60) + 0.5 * GRAVITY * (t * 60) * (t * 60);
                    
                    particle.style.transform = `translate(${newX - x}px, ${newY - y}px)`;
                    particle.style.opacity = Math.max(0, opacity);
                    
                    requestAnimationFrame(updateParticle);
                }
                
                requestAnimationFrame(updateParticle);
                setTimeout(() => {
                    if (particle && particle.parentNode) particle.remove();
                }, PARTICLE_LIFESPAN + 100);
            }

            function onGlobalClick(e) {
                const x = e.clientX;
                const y = e.clientY;
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const offsetX = rand(-14, 14);
                    const offsetY = rand(-12, 12);
                    createParticle(x + offsetX, y + offsetY);
                }
            }
            document.addEventListener('click', onGlobalClick);
        })();

        // ======================= 横屏监测 =======================
        const orientationOverlay = document.getElementById('orientationOverlay');
        const closeOriBtn = document.getElementById('closeOrientationBtn');
        let userClosed = false;

        function isLandscape() { return window.innerWidth > window.innerHeight; }
        function handleOrientation() {
            if (isLandscape() && !userClosed) {
                orientationOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            } else {
                orientationOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }
        function closeOri() { userClosed = true; orientationOverlay.classList.remove('active'); document.body.style.overflow = ''; }
        window.addEventListener('resize', handleOrientation);
        window.addEventListener('orientationchange', () => setTimeout(handleOrientation, 30));
        if (closeOriBtn) closeOriBtn.addEventListener('click', closeOri);
        orientationOverlay.addEventListener('click', (e) => { if (e.target === orientationOverlay) closeOri(); });
        handleOrientation();

        // ======================= 公告数据 =======================

        function formatSummary(text) {
            if (!text) return '';
            let trimmed = text.trim();
            if (trimmed.length > 75) {
                return trimmed.substring(0, 75) + '...';
            }
            return trimmed;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]).replace(/\n/g, '<br>');
        }

        function renderAnnouncements() {
            if (!container) return;
            container.innerHTML = '';
            announcementsData.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'announcement-card';
                card.setAttribute('data-idx', idx);
                card.innerHTML = `

                container.appendChild(card);
            });

        // 弹窗逻辑
        const modal = document.getElementById('modal');
        const modalDate = document.getElementById('modalDate');
        const modalBody = document.getElementById('modalBody');
        let isModalOpen = false;

        function openModal(date, content) {
            modalDate.innerHTML = escapeHtml(date);
            modalBody.innerHTML = escapeHtml(content);
            modal.classList.add('show');
            isModalOpen = true;
            document.body.style.overflow = 'hidden';

            modal.classList.remove('show');
            isModalOpen = false;
            document.body.style.overflow = '';
        }
